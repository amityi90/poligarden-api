# NOTE: AWS App Runner has a fixed ~120s per-request timeout and exposes no
#       knob to raise it (neither in apprunner.yaml, the Console, nor the
#       UpdateService API as of AWS CLI 2.34.30). Long-running endpoints must
#       either be made faster or made async (return 202 + poll a job endpoint).
version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - python3 --version
      - python3 -m pip --version
    build:
      - python3 -m pip install --no-cache-dir --prefer-binary -r requirements.txt
      - python3 -m pip install --no-cache-dir --prefer-binary -r requirements.txt --target /app
run:
  command: python3 start.py
  network:
    port: 8080
    env: PORT
  secrets:
    - name: PLANTS_DATABASE_URL
      value-from: "arn:aws:secretsmanager:us-east-1:730335487266:secret:polygarden/plants-database-url-6CZ7xf"
  env:
    - name: SUPABASE_URL
      value: "https://jfqtyxrbqolzbvglqnno.supabase.co"
    - name: SUPABASE_KEY
      value: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmcXR5eHJicW9semJ2Z2xxbm5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzA3NzIsImV4cCI6MjA5MDgwNjc3Mn0.IA_iEaEtqEhmalwGg1ourzVtn9RnhJtW743XV1kRGgQ"
    - name: PYTHONPATH
      value: "/app"
